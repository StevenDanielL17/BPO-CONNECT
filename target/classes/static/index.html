<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPO Service Connect</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>BPO Service Connect - Agent Dashboard</h1>
        <div id="user-info">Logged in as: <span id="current-user">Not Logged In</span></div>
    </header>

    <div class="container">
        <!-- Login Panel -->
        <div class="panel">
            <h2>User Login</h2>
            <div class="form-group">
                <label>Username:</label>
                <input type="text" id="username" placeholder="agent1">
            </div>
            <div class="form-group">
                <label>Password:</label>
                <input type="password" id="password" placeholder="pass123">
            </div>
            <button onclick="login()">Login</button>
            <div id="login-result" class="result-box"></div>
        </div>

        <div class="panel">
            <h2>Simulate Inbound Call</h2>
            <div class="form-group">
                <label>Phone Number (ANI):</label>
                <input type="text" id="ani-input" placeholder="e.g. 555-1234">
            </div>
            <button onclick="simulateCall()">Simulate Call</button>
            <div id="screen-pop-result" class="result-box"></div>
        </div>

        <!-- KB Search Panel -->
        <div class="panel">
            <h2>Knowledge Base</h2>
            <div class="form-group">
                <label>Search Query:</label>
                <input type="text" id="kb-query" placeholder="e.g. Password">
            </div>
            <button onclick="searchKB()">Search</button>
            <div id="kb-results" class="result-box"></div>
        </div>

        <div class="panel">
            <h2>Create Support Ticket</h2>
            <div class="form-group">
                <label>Customer ID:</label>
                <input type="text" id="cust-id" placeholder="e.g. C001" disabled>
            </div>
            <div class="form-group">
                <label>Channel:</label>
                <select id="channel">
                    <option value="Voice">Voice</option>
                    <option value="Email">Email</option>
                    <option value="Chat">Chat</option>
                </select>
            </div>
            <div class="form-group">
                <label>Severity:</label>
                <select id="severity">
                    <option value="Low">Low</option>
                    <option value="High">High</option>
                    <option value="Critical">Critical</option>
                </select>
            </div>
            <div class="form-group">
                <label>Description:</label>
                <textarea id="description" rows="3" placeholder="Describe issue..."></textarea>
            </div>
            <button onclick="createTicket()">Create Ticket</button>
            <div id="ticket-result" class="result-box"></div>
        </div>

        <!-- Team Leader Panel -->
        <div class="panel">
            <h2>Team Leader Tools</h2>
            <button onclick="generateReport()">Generate Daily Support Report</button>
        </div>

        <!-- QA Panel -->
        <div class="panel">
            <h2>Quality Analyst Tools</h2>
            <div class="form-group">
                <label>Agent ID:</label>
                <input type="text" id="qa-agent-id" placeholder="A101">
            </div>
            <button onclick="loadEvaluations()">View Agent Evaluations</button>
            <div id="qa-results" class="result-box"></div>
        </div>

        <div class="panel ticket-list-panel">
            <h2>Active Tickets</h2>
            <button onclick="loadTickets()" style="margin-bottom: 10px;">Refresh Queue</button>
            <table id="tickets-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Customer</th>
                        <th>Channel</th>
                        <th>Severity</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Populated by JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
