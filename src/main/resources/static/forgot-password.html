<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - BPO Connect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Manrope:wght@400;500;600;700&family=Sora:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/tokens.css">
    <link rel="stylesheet" href="assets/css/base.css">
    <link rel="stylesheet" href="assets/css/layout.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/public-pages.css">
</head>
<body data-page="forgot-password">
    <main class="auth-shell">
        <div class="auth-badge">Password recovery</div>
        <h1 class="auth-title">Get a reset token</h1>
        <p class="auth-lead">Enter the email address registered in the database. The app will generate a reset token you can use on the next page.</p>

        <div class="error-box" id="forgotError"></div>
        <div class="success-box" id="forgotSuccess"></div>

        <form id="forgotPasswordForm" class="auth-grid">
            <div class="field">
                <label for="email">Email address</label>
                <input type="email" id="email" name="email" placeholder="name@company.com" autocomplete="email" required>
            </div>
            <button type="submit" class="btn btn-primary btn-auth">Send Reset Token</button>
        </form>

        <div class="token-box" id="resetTokenBox"></div>

        <div class="auth-links">
            <a href="reset-password.html">Reset password</a>
            <a href="login.html">Back to sign in</a>
            <a href="index.html">Back home</a>
        </div>
    </main>

    <script src="assets/js/api-client.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/pages/forgot-password.js"></script>
</body>
</html>
