<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - BPO Connect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Manrope:wght@400;500;600;700&family=Sora:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/tokens.css">
    <link rel="stylesheet" href="assets/css/base.css">
    <link rel="stylesheet" href="assets/css/layout.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/public-pages.css">
</head>
<body data-page="login">
    <main class="auth-shell">
        <div class="auth-badge">BPO Connect</div>
        <h1 class="auth-title">Sign in with your email</h1>
        <p class="auth-lead">Use the email address stored in the database. The app will route you to the right workspace after authentication.</p>

        <div class="error-box" id="loginError"></div>

        <form id="loginForm" class="auth-grid">
            <div class="field">
                <label for="email">Email address</label>
                <input type="email" id="email" name="email" placeholder="name@company.com" autocomplete="email" required>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Your password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-auth">Sign In</button>
        </form>

        <section class="landing-health" style="margin-top: 6px;">
            <div class="landing-health-header">
                <h2>Built-in Admin Access</h2>
                <div class="actions" style="gap: 8px; flex-wrap: wrap;">
                    <button type="button" class="btn btn-secondary" data-demo-login data-email="sarah.connor@bpo.com" data-password="pass123">Use Agent Demo</button>
                    <button type="button" class="btn btn-secondary" data-demo-login data-email="alex.turner@bpo.com" data-password="admin456">Use Supervisor Demo</button>
                    <button type="button" class="btn btn-secondary" data-demo-login data-email="admin@bpo.com" data-password="admin123">Use Admin Demo</button>
                </div>
            </div>
              </section>

        <div class="auth-links">
            <a href="signup.html">Create an account</a>
            <a href="forgot-password.html">Forgot password?</a>
            <a href="index.html">Back home</a>
        </div>

        <div class="auth-footer">BPO Connect authentication portal</div>
    </main>

    <script src="assets/js/api-client.js?v=20260412"></script>
    <script src="assets/js/auth.js?v=20260412"></script>
    <script src="assets/js/pages/login.js?v=20260412"></script>
</body>
</html>
