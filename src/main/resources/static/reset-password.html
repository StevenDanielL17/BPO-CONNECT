<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - BPO Connect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Manrope:wght@400;500;600;700&family=Sora:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/tokens.css">
    <link rel="stylesheet" href="assets/css/base.css">
    <link rel="stylesheet" href="assets/css/layout.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/public-pages.css">
</head>
<body data-page="reset-password">
    <main class="auth-shell">
        <div class="auth-badge">Reset password</div>
        <h1 class="auth-title">Change your password</h1>
        <p class="auth-lead">Paste the reset token from the recovery page, then choose a new password.</p>

        <div class="error-box" id="resetError"></div>
        <div class="success-box" id="resetSuccess"></div>

        <form id="resetPasswordForm" class="auth-grid">
            <div class="field">
                <label for="token">Reset token</label>
                <input type="text" id="token" name="token" placeholder="Paste your token here" required>
            </div>
            <div class="field">
                <label for="newPassword">New password</label>
                <input type="password" id="newPassword" name="newPassword" placeholder="Choose a new password" required>
            </div>
            <div class="field">
                <label for="confirmPassword">Confirm password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Repeat the new password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-auth">Update Password</button>
        </form>

        <div class="auth-links">
            <a href="forgot-password.html">Request a new token</a>
            <a href="login.html">Back to sign in</a>
            <a href="index.html">Back home</a>
        </div>
    </main>

    <script src="assets/js/api-client.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/pages/reset-password.js"></script>
</body>
</html>
