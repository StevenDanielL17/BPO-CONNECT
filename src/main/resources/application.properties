# Default runtime database (Postgres/Supabase)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:postgres}
spring.config.import=optional:file:.env[.properties]
spring.datasource.url=${DB_POOLER_URL:${DB_URL}}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.hikari.data-source-properties.sslmode=require
spring.datasource.hikari.data-source-properties.stringtype=unspecified

# H2 Console disabled by default
spring.h2.console.enabled=false

# JPA Settings
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Server Settings
server.port=${PORT:8080}

# CORS (comma-separated origins)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:8080,http://localhost:3000}
