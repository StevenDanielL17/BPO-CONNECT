<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPO Connect | Tickets</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Manrope:wght@400;500;600;700&family=Sora:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/tokens.css">
    <link rel="stylesheet" href="assets/css/base.css">
    <link rel="stylesheet" href="assets/css/layout.css">
    <link rel="stylesheet" href="assets/css/components.css">
</head>
<body data-page="tickets">
    <script src="assets/js/auth.js"></script>
    <script>
        requireRole('agent');
    </script>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="brand"><p class="kicker">BPO Connect</p><h2 class="title">Agent Workspace</h2><small id="userDisplay">Agent</small></div>
            <nav class="nav-list" aria-label="Primary">
                <a class="nav-item" data-nav data-route="calls" href="calls.html">📞 Calls & Screen Pop</a>
                <a class="nav-item active" data-nav data-route="tickets" href="tickets.html">🎫 Ticket Workspace</a>
                <a class="nav-item" data-nav data-route="knowledge-base" href="knowledge-base.html">📚 Knowledge Base</a>
            </nav>
            <nav class="nav-list" aria-label="Account" style="border-top: 1px solid var(--color-slate-700); margin-top: 20px; padding-top: 20px;">
                <button onclick="logout()" class="nav-item" style="text-align: left; background: none; border: none; cursor: pointer; width: 100%;">🚪 Logout</button>
            </nav>
        </aside>

        <main class="content">
            <section class="topbar">
                <div><h1>Ticket Workspace</h1><p>Handle and track customer support tickets efficiently.</p></div>
                <div class="actions"><button class="btn btn-primary" onclick="location.reload()">🔄 Refresh</button></div>
            </section>

            <section class="page-grid">
                <article class="card col-12">
                    <h2>All Tickets</h2>
                    <div style="margin-bottom: 15px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px;">
                        <div>
                            <label style="display: block; margin-bottom: 6px; font-weight: 600; color: #64748b; font-size: 0.85rem;">Search</label>
                            <input id="searchInput" placeholder="Search ticket or customer..." style="width: 100%; padding: 10px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; color: #1e293b;">
                        </div>
                        <div>
                            <label style="display: block; margin-bottom: 6px; font-weight: 600; color: #64748b; font-size: 0.85rem;\">Severity</label>
                            <select id="severityFilter" style="width: 100%; padding: 10px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; color: #1e293b;">
                                <option value="">All Severities</option>
                                <option value="Critical">🔴 Critical</option>
                                <option value="High">🟠 High</option>
                                <option value="Medium">🟡 Medium</option>
                                <option value="Low">🟢 Low</option>
                            </select>
                        </div>
                        <div>
                            <label style=\"display: block; margin-bottom: 6px; font-weight: 600; color: #64748b; font-size: 0.85rem;\">Status</label>
                            <select id="statusFilter" style="width: 100%; padding: 10px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; color: #1e293b;">
                                <option value="">All Status</option>
                                <option value="New">New</option>
                                <option value="Open">Open</option>
                                <option value="InProgress">In Progress</option>
                                <option value="Resolved">Resolved</option>
                                <option value="Escalated">Escalated</option>
                            </select>
                        </div>
                    </div>
                    <div style="overflow-x: auto; border: 1px solid #e2e8f0; border-radius: 8px;">
                        <table class="table">
                            <thead><tr><th>Ticket ID</th><th>Customer</th><th>Channel</th><th>Severity</th><th>Status</th><th>Description</th><th>Action</th></tr></thead>
                            <tbody id="ticketsTableBody">
                                <tr><td colspan="7" style="text-align: center; color: #94a3b8; padding: 20px;">Loading tickets...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </article>
            </section>
        </main>
    </div>

    <nav class="mobile-nav" aria-label="Mobile">
        <a href="calls.html" data-mobile-nav data-route="calls">📞 Calls</a>
        <a href="tickets.html" data-mobile-nav data-route="tickets">🎫 Tickets</a>
        <a href="knowledge-base.html" data-mobile-nav data-route="knowledge-base">📚 KB</a>
    </nav>

    <script src="assets/js/api-client.js"></script>
    <script src="assets/js/nav.js"></script>
    <script>
        let allTickets = [];

        // Load tickets on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadAllTickets();
            
            // Add filter event listeners
            document.getElementById('searchInput').addEventListener('input', filterTickets);
            document.getElementById('severityFilter').addEventListener('change', filterTickets);
            document.getElementById('statusFilter').addEventListener('change', filterTickets);
        });

        async function loadAllTickets() {
            try {
                const response = await fetch('/api/tickets');
                allTickets = await response.json();
                renderTickets(allTickets);
            } catch (error) {
                console.error('Error loading tickets:', error);
                document.getElementById('ticketsTableBody').innerHTML = '<tr><td colspan="7" style="text-align: center; color: #ef4444;">Failed to load tickets</td></tr>';
            }
        }

        function renderTickets(tickets) {
            const tbody = document.getElementById('ticketsTableBody');
            
            if (tickets.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; color: #94a3b8;">No tickets found.</td></tr>';
                return;
            }

            tbody.innerHTML = tickets.map(ticket => {
                const statusClass = ticket.status.toLowerCase().replace(' ', '-');
                const severityClass = ticket.severity.toLowerCase();
                
                return `
                    <tr>
                        <td><strong>${ticket.ticketId}</strong></td>
                        <td>${ticket.customerId || 'N/A'}</td>
                        <td>${ticket.channel || 'General'}</td>
                        <td><span class="chip chip-${severityClass}">${ticket.severity}</span></td>
                        <td><span class="chip chip-${statusClass}">${ticket.status}</span></td>
                        <td style="max-width: 300px; overflow: hidden; text-overflow: ellipsis;">${ticket.description || 'No description'}</td>
                        <td>
                            <button class="btn btn-primary" style="padding: 5px 10px; font-size: 0.9rem; margin-right: 5px;" onclick="updateTicketStatus('${ticket.ticketId}', 'InProgress')">Take</button>
                            <button class="btn btn-secondary" style="padding: 5px 10px; font-size: 0.9rem;" onclick="escalateTicket('${ticket.ticketId}')">Escalate</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function filterTickets() {
            const searchQuery = document.getElementById('searchInput').value.toLowerCase();
            const severityFilter = document.getElementById('severityFilter').value;
            const statusFilter = document.getElementById('statusFilter').value;

            const filtered = allTickets.filter(ticket => {
                const matchesSearch = !searchQuery || 
                    ticket.ticketId.toLowerCase().includes(searchQuery) || 
                    (ticket.customerId && ticket.customerId.toLowerCase().includes(searchQuery)) ||
                    (ticket.description && ticket.description.toLowerCase().includes(searchQuery));
                
                const matchesSeverity = !severityFilter || ticket.severity === severityFilter;
                const matchesStatus = !statusFilter || ticket.status === statusFilter;

                return matchesSearch && matchesSeverity && matchesStatus;
            });

            renderTickets(filtered);
        }

        async function updateTicketStatus(ticketId, newStatus) {
            try {
                const response = await fetch(`/api/tickets/${ticketId}/status`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ status: newStatus })
                });

                if (response.ok) {
                    alert('Ticket status updated to: ' + newStatus);
                    loadAllTickets();
                }
            } catch (error) {
                console.error('Error updating ticket:', error);
            }
        }

        async function escalateTicket(ticketId) {
            try {
                const response = await fetch(`/api/tickets/${ticketId}/escalate`, {
                    method: 'POST'
                });
                if (response.ok) {
                    alert('Ticket escalated successfully!');
                    loadAllTickets();
                }
            } catch (error) {
                console.error('Error escalating ticket:', error);
            }
        }
    </script>
</body>
</html>
